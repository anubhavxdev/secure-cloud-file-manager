# ============================================================
# CloudVault — Secure Cloud File Management System
# ============================================================

spring.application.name=cloudvault-backend

# ------------------------------------------------------------
# PostgreSQL (Supabase)
# ------------------------------------------------------------
# Replace with your Supabase project's database connection info.
# Find these at: Supabase Dashboard → Project Settings → Database
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP — Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ------------------------------------------------------------
# JWT Configuration
# ------------------------------------------------------------
# IMPORTANT: Replace with a secure Base64-encoded key (min 256-bit).
# Generate one with: openssl rand -base64 64
jwt.secret=REPLACE_WITH_A_SECURE_BASE64_ENCODED_SECRET_KEY_MIN_256_BITS
jwt.expiration-ms=86400000

# ------------------------------------------------------------
# Supabase Storage
# ------------------------------------------------------------
# Find these at: Supabase Dashboard → Project Settings → API
supabase.url=https://YOUR_PROJECT_REF.supabase.co
supabase.service-role-key=YOUR_SUPABASE_SERVICE_ROLE_KEY
supabase.storage.bucket=files

# ------------------------------------------------------------
# File Upload Limits
# ------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ------------------------------------------------------------
# Server
# ------------------------------------------------------------
server.port=8080
